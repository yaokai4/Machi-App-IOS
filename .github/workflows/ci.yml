name: iOS CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list devices available

      - name: Build app
        run: |
          set -o pipefail
          xcodebuild \
            -project Machi.xcodeproj \
            -scheme Machi \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath "$RUNNER_TEMP/machi-derived-data" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests
        run: |
          set -euo pipefail
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          devices = json.load(sys.stdin)["devices"]
          for runtime in sorted(devices, reverse=True):
              for device in devices[runtime]:
                  if device.get("isAvailable") and device["name"].startswith("iPhone"):
                      print(device["udid"])
                      raise SystemExit(0)
          raise SystemExit("No available iPhone simulator")
          ')
          xcodebuild \
            -project Machi.xcodeproj \
            -scheme Machi \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -derivedDataPath "$RUNNER_TEMP/machi-derived-data" \
            CODE_SIGNING_ALLOWED=NO \
            test \
            -only-testing:MachiTests
